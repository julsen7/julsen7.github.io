<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julsen</title>
    <link rel="icon" href="images/favicon.png">
    <meta name="theme-color" content="#24292F">
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <!-- background -->
    <div class="background">
        <img class="img-bg" src="images/background.png">
        <div class="slice-div"></div>
    </div>

    <!-- profile info -->
    <div class="profile-info">
        <div class="profile-info-top">
            <div class="profile-image-wrapper">
                <img src="images/logos/julsen.png" decoding="async" class="profile-image">
            </div>
        </div>
        <div class="profile-info-bottom">
            <div class="profile-name-wrapper">
                <h1 class="profile-name">Julsen</h1>
                <div class="profile-verified-icon-wrapper">
                    <img src="images/icons/verified-icon.svg" class="profile-verified-icon" alt="Verified" title="Verified">
                </div>
            </div>
            <div class="profile-location-wrapper">
                <img src="images/icons/location-icon.svg" class="profile-location-icon" alt="Location" class="location-icon">
                <div class="profile-location-text">youtube.com/@Julsen7</div>
            </div>
            <p class="profile-bio">YouTube Content Creator<br>Minecraft Development</p>
        </div>
        <!-- profile shortcuts -->
        <div class="social-buttons">
            <a href="https://youtube.com/@Julsen7" class="action-button">
                <div class="action-button-bg" style="background-color:#e62117"></div>
                <img src="images/icons/youtube-icon.svg" class="action-button-icon" alt="YouTube">
                <div class="action-button-text">Abonnieren</div>
                <div class="action-button-count">24</div>
            </a>
            <a href="https://discord.gg/64WaYFnm" class="action-button">
                <div class="action-button-bg" style="background-color:#5865f2"></div>
                <img src="images/icons/discord-icon.svg" class="action-button-icon" alt="Discord">
                <div class="action-button-text">Verbinden</div>
                <div class="action-button-count">8</div>
            </a>
            <a href="https://twitch.tv/julsen7" class="action-button">
                <div class="action-button-bg" style="background-color:#9146ff"></div>
                <img src="images/icons/twitch-icon.svg" class="action-button-icon" alt="Twitch">
                <div class="action-button-text">Folgen</div>
                <div class="action-button-count">6</div>
            </a>
            <a href="https://instagram.com/julsen.7" class="action-button">
                <div class="action-button-bg" style="background-image:linear-gradient(45deg, #feb811, #9e27ad)">
                </div>
                <img src="images/icons/instagram-icon.svg" class="action-button-icon" alt="Instagram">
                <div class="action-button-text">Folgen</div>
                <div class="action-button-count">0</div>
            </a>
            <a href="https://github.com/Julsen7" class="action-button">
                <div class="action-button-bg" style="background-color: #24292F;"></div>
                <img src="images/icons/github-icon.svg" class="action-button-icon" alt="GitHub">
                <div class="action-button-text">Folgen</div>
                <div class="action-button-count">1</div>
            </a>
        </div>
    </div>

    <!-- sections -->
    <div class="sections">
        <!--"main stage"-section -->
        <div class="section">
            <h2 style="color: #ffcb46;" class="section-title">The Main Stage</h2>
            <div class="section-item">
                <a href="https://youtube.com/@Julsen7" class="item-link">
                    <div class="link-icon-float" style="box-shadow:0 8px 14px -4px rgba(230, 33, 23, 0.65)">
                        <div class="item-link-beacon" style="background-color:rgba(230, 33, 23, 0.85)"></div>
                        <img src="images/logos/youtube.svg" class="link-icon-float-image">
                    </div>
                    <div>
                        <div>YouTube</div>
                        <div class="link-url">@Julsen7</div>
                    </div>
                    <div class="link-arrow-wrapper"><img src="images/icons/arrow-icon.svg"></div>
                </a>
            </div>
            <div class="section-item">
                <a href="https://discord.gg/64WaYFnm" class="item-link">
                    <div class="link-icon-float" style="box-shadow:0 8px 14px -4px rgba(88, 101, 242, 0.65)">
                        <div class="item-link-beacon" style="background-color:rgba(88, 101, 242, 0.85)"></div>
                        <img src="images/logos/discord.svg" class="link-icon-float-image">
                    </div>
                    <div>
                        <div>Discord</div>
                        <div class="link-url">Julsen Universe</div>
                    </div>
                    <div class="link-arrow-wrapper"><img src="images/icons/arrow-icon.svg"></div>
                </a>
            </div>
            <div class="section-item">
                <a href="https://www.twitch.tv/julsen7" class="item-link">
                    <div class="link-icon-float" style="box-shadow:0 8px 14px -4px rgba(145, 70, 255, 0.65)">
                        <div class="item-link-beacon" style="background-color:rgba(145, 70, 255, 0.85)"></div>
                        <img src="images/logos/twitch.svg" class="link-icon-float-image">
                    </div>
                    <div>
                        <div>Twitch</div>
                        <div class="link-url">/julsen7</div>
                    </div>
                    <div class="link-arrow-wrapper"><img src="images/icons/arrow-icon.svg"></div>
                </a>
            </div>
            <div class="section-item">
                <a href="https://github.com/Julsen7" class="item-link">
                    <div class="link-icon-float" style="box-shadow:0 8px 14px -4px rgba(36, 41, 47, 0.65)">
                        <div class="item-link-beacon" style="background-color:rgba(36, 41, 47, 0.85)"></div>
                        <img src="images/logos/github.svg" class="link-icon-float-image">
                    </div>
                    <div>
                        <div>GitHub</div>
                        <div class="link-url">/Julsen7</div>
                    </div>
                    <div class="link-arrow-wrapper"><img src="images/icons/arrow-icon.svg"></div>
                </a>
            </div>
        </div>
        <!--"minecraft server"-section 
        <div class="section">
            <h2 style="color: #13f562;" class="section-title">Minecraft</h2>
            <div class="section-item section-item-large">
                <a href="" class="item-link">
                    <div class="link-icon-float" style="box-shadow:0 8px 14px -4px rgba(17, 17, 17, 0.65)">
                        <div class="item-link-beacon" style="background-color:rgba(17, 17, 17, 0.85)"></div>
                        <img src="images/logos/minecraft.png" class="link-icon-float-image">
                    </div>
                    <div>
                        <div>The Knights of War</div>
                        <div class="link-url">[server-ip]</div>
                    </div>
                    <div class="link-arrow-wrapper"><img src="images/icons/arrow-icon.svg"></div>
                </a>
            </div>
        </div>
        -->
    </div>
</body>

</html>
